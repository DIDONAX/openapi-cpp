paths:
  /items/{param1}/{param2}:
    get:
      operationId: getItems
      parameters:
        - name: param1
          required: true
          in: path
          schema:
            type: string
        - name: param2
          required: true
          in: path
          schema:
            type: integer
        - name: param3
          schema:
            type: integer

      responses:
        200:
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
components:
  schemas:
    Status:
      type: string
      enum:
        - ON
        - OFF

    Pets:
      type: array
      items:
        type: string
        enum:
          - A
          - B

    Item:
      type: object
      required:
        - x
        - y
      properties:
        x:
          $ref: '#/components/schemas/Status'
        y:
          $ref: '#/components/schemas/Pets'
        z:
          type: integer
